<style>

/* ================= BACKGROUND ================= */

position:fixed;

.overlay{

/* ================= HEADER ================= */

display:flex;
justify-content:space-between;
align-items:center;

filter:drop-shadow(0 0 15px #ff2e2e);

gap:18px;

nav a{

nav a:hover{

}

nav a::after{
content:'';
position:absolute;
bottom:-5px;
right:0;
width:0%;
height:2px;
background:#ff2e2e;
transition:.3s;
}

nav a:hover::after{

}

/* ================= HERO ================= */

.hero{
padding-top:170px;

}

.hero h1{

font-family:'Orbitron',sans-serif;

}

/* ================= FILTER BUTTON ================= */

padding:12px 25px;

color:white;

/* ================= VIDEO GRID ================= */

.videos{

}

.video-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);

}

.video-card:hover{

.video-card iframe{

height:200px;

.video-card h3{

/* ================= FOOTER ================= */

<script>

/* ================= PARTICLES ================= */

const canvas =
document.getElementById("bgCanvas");

const ctx =
canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<70;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff2e2e";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

</script>
