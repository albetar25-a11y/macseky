<script>

/* ================= SHORT FETCH ================= */

const channelId = "UCb9-8VgDZyQg7iT9hfI3jGQ";

async function loadLatestShort() {

try {

const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

const res = await fetch(url);
const text = await res.text();

const parser = new DOMParser();
const xml = parser.parseFromString(text, "text/xml");

const entries = xml.querySelectorAll("entry");

let videoId = null;

for(let entry of entries){

const title = entry.querySelector("title").textContent.toLowerCase();

if(title.includes("shorts") || title.includes("#shorts")){

videoId = entry.querySelector("videoId").textContent;
break;

}

}

if(!videoId && entries.length>0){
videoId = entries[0].querySelector("videoId").textContent;
}

if(videoId){

document.getElementById("latestShort").innerHTML = `
<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
`;

}

} catch(err){
document.getElementById("latestShort").innerHTML = "فشل تحميل الفيديو";
}

}

loadLatestShort();

</script>

<!-- PARTICLES -->

<script>

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff2e2e";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

</script>
