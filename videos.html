<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>أحدث الفيديوهات - Macseky</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      background:#0A0A0C;
      color:#fff;
      font-family:'Tajawal',sans-serif;
      margin:0;
      text-align:center;
      overflow-x:hidden;
    }
    header {
      background:#121212;
      padding:15px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:1000;
    }
    header img {
      height:70px;
      transition:transform 0.6s ease, filter 0.6s ease;
    }
    header img:hover {
      transform:scale(1.2) rotate(-5deg);
      filter:drop-shadow(0 0 15px #FF2E2E);
    }
    nav a {
      color:#fff;
      margin:0 10px;
      text-decoration:none;
      font-weight:bold;
      transition:color 0.3s ease;
    }
    nav a:hover {
      color:#FF2E2E;
    }
    h1 {
      margin-top:40px;
      font-size:36px;
      color:#007BFF;
      animation:slideDown 1.5s ease;
    }
    iframe {
      width:80%;
      height:400px;
      border:none;
      border-radius:10px;
      box-shadow:0 0 20px rgba(0,123,255,0.5);
      animation:fadeInUp 2s ease;
    }
    a.btn {
      display:inline-block;
      margin-top:20px;
      background:#FF2E2E;
      color:#fff;
      padding:12px 25px;
      border-radius:6px;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
      animation:fadeIn 2s ease;
    }
    a.btn:hover {
      background:#007BFF;
      transform:scale(1.1);
    }
    footer {
      background:#121212;
      text-align:center;
      padding:20px;
      font-size:14px;
    }
    @keyframes slideDown {from{transform:translateY(-50px); opacity:0;} to{transform:translateY(0); opacity:1;}}
    @keyframes fadeInUp {from{transform:translateY(50px); opacity:0;} to{transform:translateY(0); opacity:1;}}
    @keyframes fadeIn {from{opacity:0;} to{opacity:1;}}
  </style>
</head>
<body>

<header>
