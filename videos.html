<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أحدث الفيديوهات | Macseky</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Tajawal',sans-serif;
background:#050507;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
background:#050507;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,.9));
z-index:-1;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,10,.55);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:55px;
}

.logo h1{
font-family:'Orbitron',sans-serif;
font-size:24px;
}

nav{
display:flex;
gap:18px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ff2e2e;
}

/* HERO */

.hero{
padding-top:170px;
text-align:center;
padding-bottom:30px;
}

.hero h1{
font-size:55px;
font-family:'Orbitron',sans-serif;
color:#ff2e2e;
text-shadow:0 0 25px #ff2e2e;
}

/* VIDEO */

.video-box{
text-align:center;
padding:20px;
}

iframe{
width:80%;
height:450px;
border:none;
border-radius:15px;
box-shadow:0 0 25px rgba(255,46,46,.4);
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#ff2e2e;
color:white;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

footer{
padding:25px;
text-align:center;
background:rgba(0,0,0,.6);
border-top:1px solid rgba(255,255,255,.08);
margin-top:50px;
}

</style>

</head>

<body>

<canvas id="bgCanvas"></canvas>
<div class="overlay"></div>

<!-- HEADER -->

<header>

<div class="logo">
<img src="logo.png">
<h1>MACSEKY</h1>
</div>

<nav>
<a href="index.html">الرئيسية</a>
<a href="about.html">من أنا</a>
<a href="videos.html">الفيديوهات</a>
<a href="rules.html">القوانين</a>
<a href="shop.html">المتجر</a>
<a href="contact.html">تواصل</a>
</nav>

</header>

<!-- HERO -->

<section class="hero">

<h1>أحدث فيديو 🔥</h1>

</section>

<!-- VIDEO -->

<section class="video-box">

<div id="videoContainer">
<p>جاري تحميل الفيديو...</p>
</div>

<a class="btn" href="https://www.youtube.com/@macseky" target="_blank">
📺 القناة
</a>

</section>

<!-- FOOTER -->

<footer>
© 2026 MACSEKY — ALL RIGHTS RESERVED
</footer>

<script>

/* ====== LAST VIDEO LOADER (100% RELIABLE) ====== */

const channelId = "UCb9-8VgDZyQg7iT9hfI3jGQ";

async function loadVideo(){

try{

const res = await fetch(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
const text = await res.text();

const xml = new DOMParser().parseFromString(text,"text/xml");

const entry = xml.querySelector("entry");

if(!entry){
document.getElementById("videoContainer").innerHTML = "لا يوجد فيديوهات";
return;
}

const videoId = entry.querySelector("videoId").textContent;

document.getElementById("videoContainer").innerHTML = `
<iframe 
src="https://www.youtube.com/embed/${videoId}"
allowfullscreen>
</iframe>
`;

}catch(e){

document.getElementById("videoContainer").innerHTML = "فشل تحميل الفيديو";

}

}

loadVideo();

</script>

</body>
</html>
