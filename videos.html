<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أحدث الفيديوهات | Macseky</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Tajawal',sans-serif;
background:#050507;
color:white;
overflow-x:hidden;
}

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9));
z-index:-1;
}

header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,10,.55);
backdrop-filter:blur(10px);
z-index:999;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:55px;
transition:.4s;
}

.logo img:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 15px #ff2e2e);
}

.logo h1{
font-family:'Orbitron',sans-serif;
font-size:26px;
}

nav{
display:flex;
gap:18px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
position:relative;
transition:.3s;
}

nav a:hover{
color:#ff2e2e;
}

nav a::after{
content:'';
position:absolute;
bottom:-5px;
right:0;
width:0%;
height:2px;
background:#ff2e2e;
transition:.3s;
}

nav a:hover::after{
width:100%;
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:120px 20px 40px;
}

.hero-content{
max-width:900px;
}

.hero h2{
font-size:55px;
font-family:'Orbitron',sans-serif;
margin-bottom:20px;
text-shadow:0 0 20px #ff2e2e;
}

.video-box{
margin-top:30px;
}

iframe{
width:90%;
max-width:900px;
height:450px;
border-radius:15px;
box-shadow:0 0 25px rgba(255,46,46,.3);
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
background:#ff2e2e;
color:white;
border-radius:12px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 15px #ff2e2e;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
background:#007bff;
box-shadow:0 0 15px #007bff;
}

footer{
margin-top:50px;
padding:25px;
text-align:center;
background:rgba(0,0,0,.6);
border-top:1px solid rgba(255,255,255,.08);
}
</style>

</head>

<body>

<div class="video-bg"></div>
<div class="overlay"></div>

<header>
<div class="logo">
<img src="logo.png">
<h1>MACSEKY</h1>
</div>

<nav>
<a href="index.html">الرئيسية</a>
<a href="about.html">من أنا</a>
<a href="videos.html">الفيديوهات</a>
<a href="rules.html">القوانين</a>
<a href="support.html">الدعم المادي</a>
<a href="shop.html">المتجر</a>
<a href="contact.html">تواصل</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h2>أحدث فيديو</h2>

<div class="video-box">
<iframe id="ytvideo" allowfullscreen></iframe>
</div>

<a class="btn" href="https://www.youtube.com/@macseky" target="_blank">
شاهد القناة
</a>
</div>
</section>

<footer>
© 2026 MACSEKY — ALL RIGHTS RESERVED
</footer>

<script>
const channelId = "UCb9-8VgDZyQg7iT9hfI3jGQ";

fetch(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`)
  .then(res => res.text())
  .then(str => {
    const parser = new DOMParser();
    const xml = parser.parseFromString(str, "text/xml");

    const videoId = xml.querySelector("entry > yt\\:videoId").textContent;

    document.getElementById("ytvideo").src =
      `https://www.youtube.com/embed/${videoId}`;
  })
  .catch(err => {
    console.log("Error loading video", err);
  });
</script>

</body>
</html>
