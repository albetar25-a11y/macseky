<script>

/* ================= STATS ================= */

async function loadStats(){

try{

const res = await fetch("https://kick.com/api/v1/channels/macseky");
const data = await res.json();

document.getElementById("viewers").innerText = data.viewers_count || 0;
document.getElementById("game").innerText = data.livestream?.category?.name || "غير متوفر";
document.getElementById("status").innerText = data.livestream ? "🟢 مباشر" : "🔴 أوفلاين";

let percent = Math.min(data.viewers_count || 0, 100);
document.getElementById("bar").style.width = percent + "%";

}catch(e){
console.log("error stats");
}

}

loadStats();
setInterval(loadStats,10000);

/* ================= YOUTUBE LAST VIDEO ================= */

const channelId = "UCb9-8VgDZyQg7iT9hfI3jGQ";

async function loadVideo(){

const res = await fetch(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
const text = await res.text();

const xml = new DOMParser().parseFromString(text,"text/xml");

const id = xml.querySelector("entry videoId").textContent;

document.getElementById("video").innerHTML = `
<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
`;

}

loadVideo();

/* ================= PARTICLES ================= */

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff2e2e";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

</script>
