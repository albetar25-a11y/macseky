<style>

/* ================= BASE ================= */

margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Tajawal',sans-serif;
background:#050507;

/* ================= BACKGROUND VIDEO (FIXED) ================= */

.video-bg{

/* ================= PARTICLES BG ================= */

top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* ================= HEADER ================= */

header{
position:fixed;
top:0;
width:100%;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,10,.6);

z-index:999;
}

nav{

gap:15px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;

}

nav a:hover{color:#ff2e2e;}

/* ================= HERO ================= */

.hero{
padding-top:180px;
text-align:center;
padding-bottom:40px;
}

.hero h1{

font-family:'Orbitron',sans-serif;

text-shadow:0 0 25px #ff2e2e;
}

.hero button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:10px;
background:#ff2e2e;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px #ff2e2e;
}

.hero button:hover{
transform:scale(1.1);
background:#007bff;
}

/* ================= SECTIONS ================= */

section{
text-align:center;
margin:40px auto;
max-width:900px;
}

/* ================= DASHBOARD ================= */

.dashboard{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,46,46,.2);
}

.bar{
width:80%;
height:18px;
background:#222;
margin:10px auto;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#ff2e2e;
transition:.5s;
}

/* ================= VIDEO ================= */

iframe{
width:85%;
height:420px;
border:none;
border-radius:15px;
box-shadow:0 0 20px rgba(255,46,46,.3);
}

/* ================= SUPPORT ================= */

padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,46,46,.2);

.support h2{color:#ff2e2e;}

.support a{

margin:10px;
padding:12px 22px;

.paypal{background:#0070ba;}
.coffee{background:#ff2e2e;}

.support a:hover{transform:scale(1.1);}

/* ================= FOOTER ================= */

footer{
margin-top:50px;
padding:20px;
background:rgba(0,0,0,.6);
border-top:1px solid rgba(255,255,255,.08);
text-align:center;
}

</style>

<script>

/* ================= BACKGROUND VIDEO FIX SCRIPT ================= */

const videos = [
"videos/video1.mp4",
"videos/video2.mp4",
"videos/video3.mp4"
];

const video = document.getElementById("bgVideo");

let index = 0;

function playVideo(){

video.src = videos[index];
video.load();

video.play().catch(()=>{});

index++;

if(index >= videos.length){
index = 0;
}

}

playVideo();

setInterval(playVideo,30000);

/* ================= PARTICLES ================= */

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff2e2e";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
