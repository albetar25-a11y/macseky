<!DOCTYPE html>
<html lang="ar" dir="rtl">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Tajawal',sans-serif;
background:#050507;
color:white;
overflow-x:hidden;
}

/* ================= BACKGROUND ================= */

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
background:#050507;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,.9));
z-index:-1;
}

/* ================= HEADER ================= */

header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,10,.55);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:55px;
transition:.3s;
}

.logo img:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 15px #ff2e2e);
}

.logo h1{
font-family:'Orbitron',sans-serif;
font-size:24px;
}

nav{
display:flex;
gap:18px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;
position:relative;
}

nav a:hover{
color:#ff2e2e;
}

nav a::after{
content:'';
position:absolute;
bottom:-5px;
right:0;
width:0%;
height:2px;
background:#ff2e2e;
transition:.3s;
}

nav a:hover::after{
width:100%;
}

/* ================= HERO ================= */

.hero{
padding-top:170px;
text-align:center;
padding-bottom:30px;
}

.hero h1{
font-size:55px;
font-family:'Orbitron',sans-serif;
color:#ff2e2e;
text-shadow:0 0 25px #ff2e2e, 0 0 50px #007bff;
}

.hero p{
color:#ddd;
margin-top:10px;
font-size:18px;
}

/* ================= COMING SOON ================= */

.coming{
max-width:800px;
margin:60px auto;
text-align:center;
padding:40px 20px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:20px;
box-shadow:0 0 25px rgba(255,46,46,.2);
animation:fadeUp 1.5s ease;
}

.coming h2{
font-size:32px;
color:#ff2e2e;
margin-bottom:15px;
text-shadow:0 0 20px #ff2e2e;
}

.coming p{
font-size:18px;
color:#ddd;
line-height:1.8;
}

/* ================= BADGE ================= */

.badge{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#ff2e2e;
border-radius:12px;
font-weight:bold;
box-shadow:0 0 20px #ff2e2e;
}

/* ================= FOOTER ================= */

footer{
padding:25px;
text-align:center;
background:rgba(0,0,0,.6);
border-top:1px solid rgba(255,255,255,.08);
margin-top:80px;
}

/* ================= ANIMATION ================= */

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<script>

/* ================= PARTICLES ================= */

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff2e2e";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
