<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الدعم المادي | Macseky</title>

<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Tajawal',sans-serif;
background:#050507;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,.9));
z-index:-1;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,10,.55);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:55px;
transition:.3s;
}

.logo img:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 15px #ff2e2e);
}

.logo h1{
font-family:'Orbitron',sans-serif;
font-size:24px;
}

/* HERO */

.hero{
padding-top:170px;
text-align:center;
}

.hero h1{
font-size:55px;
font-family:'Orbitron',sans-serif;
color:#ff2e2e;
text-shadow:0 0 25px #ff2e2e;
}

.hero p{
max-width:700px;
margin:20px auto;
color:#ddd;
line-height:1.8;
}

/* BUTTONS */

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin:30px 0;
}

.btn{
padding:15px 30px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:white;
transition:.3s;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.paypal{
background:#0070ba;
}

.coffee{
background:#ff2e2e;
}

.btn:hover{
transform:scale(1.08);
}

/* GOAL */

.goal{
max-width:700px;
margin:40px auto;
text-align:center;
}

.bar{
width:100%;
height:25px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff2e2e,#ff6f61);
transition:1s;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
width:90%;
max-width:400px;
box-shadow:0 0 30px rgba(255,46,46,.3);
}

.popup-box img{
height:60px;
margin-bottom:10px;
}

.close{
display:block;
margin-top:15px;
cursor:pointer;
color:#ff2e2e;
font-weight:bold;
}

/* FOOTER */

footer{
margin-top:60px;
padding:25px;
text-align:center;
background:rgba(0,0,0,.6);
border-top:1px solid rgba(255,255,255,.08);
}

</style>

</head>

<body>

<canvas id="bgCanvas"></canvas>
<div class="overlay"></div>

<!-- HEADER -->

<header>

<div class="logo">
<img src="logo.png">
<h1>MACSEKY</h1>
</div>

</header>

<!-- HERO -->

<section class="hero">

<h1>الدعم المادي </h1>

<p>
دعمك يساعدني أطور المحتوى وأقدم بثوث أقوى وأفكار جديدة يومياً 🔥
</p>

</section>

<!-- BUTTONS -->

<div class="buttons">

<a class="btn paypal" href="https://streamlabs.com/maacseky/tip" target="_blank">
💳 دعم عبر PayPal
</a>

<a class="btn coffee" href="https://creators.sa/yazanalbitar" target="_blank">
☕ Buy Me a Coffee
</a>

</div>

<!-- GOAL -->

<div class="goal">

<h2>🎯 هدف الشهر</h2>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<p id="text">جاري تحميل الهدف...</p>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<img src="logo.png">

<h2>💖 شكراً لزيارتك</h2>

<p>دعمك يعني استمرار المحتوى 🔥</p>

<a class="btn paypal" href="https://streamlabs.com/maacseky/tip">ادعم الآن</a>

<span class="close" onclick="closePopup()">إغلاق</span>

</div>

</div>

<!-- FOOTER -->

<footer>
© 2026 MACSEKY — ALL RIGHTS RESERVED
</footer>

<script>

/* PARTICLES */

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff2e2e";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

/* FAKE GOAL SYSTEM */

let current = 320;
let goal = 1000;

let percent = Math.floor((current/goal)*100);

document.getElementById("fill").style.width = percent + "%";
document.getElementById("text").innerText =
`تم جمع ${current}$ من أصل ${goal}$ (${percent}%)`;

/* POPUP */

setTimeout(()=>{
document.getElementById("popup").style.display="flex";
},2000);

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
