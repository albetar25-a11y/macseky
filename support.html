/* ================= HEADER (مثل الرئيسية) ================= */

header{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,10,.55);

.logo{

.logo img{

nav{
display:flex;
gap:18px;

nav a{
color:white;
text-decoration:none;
font-weight:bold;

nav a:hover{

nav a::after{
content:'';
position:absolute;
bottom:-5px;
right:0;
width:0%;

}

nav a:hover::after{

.bar{

height:25px;
background:#222;
margin:auto;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:100%;
background:linear-gradient(90deg,#ff2e2e,#ff6f61);
}

.goal{
margin-top:15px;
color:#ccc;
font-size:18px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
background:#ff2e2e;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.btn:hover{
background:#007bff;
}

footer{
margin-top:60px;
padding:25px;
text-align:center;
background:rgba(0,0,0,.6);
}
